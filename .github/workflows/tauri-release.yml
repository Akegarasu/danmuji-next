name: Tauri Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}
          releaseName: danmuji-next v__VERSION__
          releaseBody: See the assets below to download this version.
          releaseDraft: false
          prerelease: false

      - name: Prepare portable executable asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $tag = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "v__VERSION__" }
          $portableName = "danmuji-next_${tag}_windows_x64_portable.exe"
          Copy-Item "src-tauri/target/release/danmuji-next.exe" "release-assets/$portableName" -Force
          "PORTABLE_ASSET=release-assets/$portableName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload portable executable to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.PORTABLE_ASSET }}
